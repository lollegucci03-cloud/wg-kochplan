        try {

            const data = await res.text();
            const rows = data.split('\n').slice(1);
            rows.forEach(r => {
                const c = r.split(',');
                if(c.length >= 2) {
                    const d = c[0].trim();
                    const n = c[1].trim();
                    if(d && n) overrides[d] = n;
                }
            });
        } catch(e) { console.log("Google Sheet konnte nicht geladen werden."); }
        render();
