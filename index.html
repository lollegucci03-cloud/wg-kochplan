<script>
    // DEIN GOOGLE SHEETS LINK BLEIBT GLEICH
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEQpGPLPJLOKyM-siB8Pwi7Pexs7ehWSxXke1_CwWW4vhJ6V1SxVnaV9JH2RD6tvwpC-TyjRl4-uz7/pub?output=csv';

    const bewohner = ["Lina", "Janco", "Cosi", "Thilo", "Felix", "Aurel"];
    const ferien2026 = [
        { s: "2026-03-30", e: "2026-04-11" }, 
        { s: "2026-05-26", e: "2026-06-05" }, 
        { s: "2026-08-03", e: "2026-09-14" }, 
        { s: "2026-11-02", e: "2026-11-06" }, 
        { s: "2026-12-23", e: "2027-01-05" }
    ];

    let onlineOverrides = {};

    async function loadSheetData() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n');
            rows.forEach((row, index) => {
                if (index === 0) return;
                const columns = row.split(',');
                if (columns.length >= 2) {
                    const datum = columns[0].trim();
                    const name = columns[1].trim();
                    if (datum && name) onlineOverrides[datum] = name;
                }
            });
            renderCalendar();
        } catch (error) {
            console.error("Fehler beim Abrufen der Google Tabelle:", error);
            renderCalendar();
        }
    }

    function isHoliday(date) {
        let d = new Date(date);
        d.setHours(12,0,0,0);
        return ferien2026.some(f => {
            let s = new Date(f.s + "T00:00:00");
            let e = new Date(f.e + "T23:59:59");
            return d >= s && d <= e;
        });
    }

    function getChefForDate(targetDate) {
        let d = new Date(targetDate);
        d.setHours(12,0,0,0);
        let day = d.getDay();
        let dateStr = d.toISOString().split('T')[0];

        // 1. Tausch aus Google Tabelle (für heute die Freundin eintragen!)
        if (onlineOverrides[dateStr]) return onlineOverrides[dateStr];
        
        // 2. Wochenende / Ferien
        if (day === 0 || day === 5 || day === 6) return "WG-Pause 🍺";
        if (isHoliday(d)) return "Ferien 🏖️";

        // 3. ANGEPASSTE ROTATION: 
        // Wir setzen den Anker auf Dienstag, den 03.03.2026.
        // Da heute die Freundin kocht (per Tabelle), wird Felix (Index 4) 
        // durch die Logik auf den nächsten verfügbaren Koch-Tag geschoben.
        const ankerDatum = new Date(2026, 2, 3, 12, 0, 0); 
        const ankerIndex = 4; // Felix startet jetzt die neue Kette

        if (d < ankerDatum) return "Vergangenheit";

        let kochTagCounter = 0;
        let checker = new Date(ankerDatum);
        while (checker <= d) {
            let dO = checker.getDay();
            if (dO >= 1 && dO <= 4 && !isHoliday(checker)) {
                kochTagCounter++;
            }
            checker.setDate(checker.getDate() + 1);
        }
        let index = (ankerIndex + (kochTagCounter - 1)) % bewohner.length;
        return bewohner[index];
    }

    function renderCalendar() {
        const calendarDiv = document.getElementById('calendar');
        calendarDiv.innerHTML = "";
        let today = new Date();
        today.setHours(12,0,0,0);

        const chefHeute = getChefForDate(today);
        document.getElementById('top-chef').innerText = chefHeute;
        document.getElementById('top-label').innerText = (chefHeute.includes("Pause") || chefHeute.includes("Ferien")) ? "Status:" : "Heutiger Lieblingskoch:";

        for (let i = 0; i < 21; i++) {
            let current = new Date();
            current.setDate(today.getDate() + i);
            current.setHours(12, 0, 0, 0);
            let chef = getChefForDate(current);
            let card = document.createElement('div');
            card.className = 'day-card';
            if (i === 0) card.classList.add('is-today');
            if (chef.includes("Pause")) card.classList.add('weekend');
            if (chef.includes("Ferien")) card.classList.add('holiday');
            let dateDisplay = current.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
            card.innerHTML = `<div class="date-info">${i === 0 ? "Heute" : dateDisplay}</div><div class="chef-info">${chef}</div><div style="width:20px"></div>`;
            calendarDiv.appendChild(card);
        }
    }
    loadSheetData();
</script>
