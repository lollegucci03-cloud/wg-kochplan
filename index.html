<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WG Kochplan</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; color: #2f3640; }
        .header { background: var(--primary); color: white; padding: 30px 10px; text-align: center; }
        .today-name { font-size: 2rem; font-weight: bold; display: block; margin-top: 10px; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .day-row { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .is-today { background: #f0fff4; font-weight: bold; border-radius: 12px; border: 2px solid var(--primary); }
        .weekend { color: #95a5a6; font-style: italic; background: #fafafa; }
        .chef { color: #3498db; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div>Heute kocht:</div>
    <div id="top-name" class="today-name">Wird geladen...</div>
</div>

<div class="container" id="calendar-list"></div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEQpGPLPJLOKyM-siB8Pwi7Pexs7ehWSxXke1_CwWW4vhJ6V1SxVnaV9JH2RD6tvwpC-TyjRl4-uz7/pub?output=csv';
    const BEWOHNER = ["Lina", "Janco", "Cosi", "Thilo", "Felix", "Aurel"];
    let onlineTausche = {};

    async function updateData() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            csv.split('\n').slice(1).forEach(row => {
                const parts = row.split(',');
                if(parts.length >= 2) onlineTausche[parts[0].trim()] = parts[1].trim();
            });
            render();
        } catch(e) { render(); }
    }

    function getChef(d) {
        const dStr = d.toISOString().split('T')[0];
        if (onlineTausche[dStr]) return onlineTausche[dStr];
        
        const day = d.getDay();
        if (day === 0 || day === 5 || day === 6) return "WG-Pause 🍺";

        // Fix für heute: Janco ist dran
        if (dStr === "2026-03-10") return "Janco";

        // Rotation ab morgen (11.03.2026) -> Cosi folgt auf Janco (Index 2)
        const anker = new Date(2026, 2, 11); 
        let kochTage = 0;
        let c = new Date(anker);
        while(c <= d) {
            if(c.getDay() >= 1 && c.getDay() <= 4) kochTage++;
            c.setDate(c.getDate() + 1);
        }
        return BEWOHNER[(2 + (kochTage - 1)) % BEWOHNER.length];
    }

    function render() {
        const container = document.getElementById('calendar-list');
        container.innerHTML = "";
        const heute = new Date();
        heute.setHours(12,0,0,0);
        document.getElementById('top-name').innerText = getChef(heute);

        for (let i = 0; i < 14; i++) {
            const d = new Date();
            d.setDate(heute.getDate() + i);
            const koch = getChef(d);
            const row = document.createElement('div');
            row.className = `day-row ${i===0?'is-today':''} ${koch.includes('Pause')?'weekend':''}`;
            row.innerHTML = `<span>${i===0?'Heute':d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit'})}</span>
                             <span class="chef">${koch}</span>`;
            container.appendChild(row);
        }
    }
    updateData();
</script>
</body>
</html>
