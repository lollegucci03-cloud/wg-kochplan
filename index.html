<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WG Kochplan</title>
    <style>
        body { font-family: sans-serif; background: #f5f6fa; margin: 0; padding: 20px; color: #2f3640; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .row { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; }
        .today { background: #e8f5e9; font-weight: bold; border: 2px solid #2ecc71; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="today-title">Heute kocht...</h2>
    <div id="calendar"></div>
</div>

<script>
    const BEWOHNER = ["Lina", "Janco", "Cosi", "Thilo", "Felix", "Aurel"];
    // Heute: 16.03. (Besuch), Morgen: 17.03. (Felix)
    
    function getKoch(date) {
        const d = date.getDate();
        const m = date.getMonth() + 1;
        const y = date.getFullYear();
        const dayStr = `${y}-${m}-${d}`;
        const wd = date.getDay(); // 0=So, 1=Mo...

        if (wd === 0 || wd === 5 || wd === 6) return "WG-Pause 🍺";
        if (dayStr === "2026-3-16") return "unser toller Besuch 🍕";
        
        // Berechnung ab 17.03. (Dienstag), Felix (Index 4) ist dran
        const start = new Date(2026, 2, 17);
        if (date < start) return "Besuch";
        
        let diff = Math.floor((date - start) / (1000 * 60 * 60 * 24));
        let count = 0;
        for(let i=0; i<=diff; i++){
            let cur = new Date(start);
            cur.setDate(start.getDate() + i);
            if(cur.getDay() >= 1 && cur.getDay() <= 4) count++;
        }
        return BEWOHNER[(4 + (count - 1)) % BEWOHNER.length];
    }

    const container = document.getElementById('calendar');
    for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        const div = document.createElement('div');
        div.className = 'row' + (i === 0 ? ' today' : '');
        div.innerHTML = `<span>${i===0?'Heute':d.toLocaleDateString('de-DE')}</span><span>${getKoch(d)}</span>`;
        container.appendChild(div);
        if(i===0) document.getElementById('today-title').innerText = "Heute kocht: " + getKoch(d);
    }
</script>
</body>
</html>
