<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WG Kochplan</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; color: #2f3640; }
        .header { background: var(--primary); color: white; padding: 30px 10px; text-align: center; }
        .today-name { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 10px; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .day-row { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .is-today { background: #f0fff4; font-weight: bold; border-radius: 12px; border: 2px solid var(--primary); }
        .weekend { color: #95a5a6; font-style: italic; background: #fafafa; }
        .chef { color: #3498db; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div>Heute kocht:</div>
    <div id="top-name" class="today-name">Wird geladen...</div>
</div>

<div class="container" id="calendar-list">
    </div>

<script>
    // Konfiguration
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSEQpGPLPJLOKyM-siB8Pwi7Pexs7ehWSxXke1_CwWW4vhJ6V1SxVnaV9JH2RD6tvwpC-TyjRl4-uz7/pub?output=csv';
    const BEWOHNER = ["Lina", "Janco", "Cosi", "Thilo", "Felix", "Aurel"];
    
    let onlineTausche = {};

    async function ladeDatenUndStart() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            const zeilen = csv.split('\n').slice(1);
            zeilen.forEach(z => {
                const spalten = z.split(',');
                if(spalten.length >= 2) {
                    const datum = spalten[0].trim();
                    const name = spalten[1].trim();
                    if(datum && name) onlineTausche[datum] = name;
                }
            });
        } catch(e) { console.warn("Google Sheet Sync fehlgeschlagen."); }
        
        baueKalender();
    }

    function werKocht(datumObj) {
        // Datum in Format JJJJ-MM-TT bringen
        const j = datumObj.getFullYear();
        const m = String(datumObj.getMonth() + 1).padStart(2, '0');
        const t = String(datumObj.getDate()).padStart(2, '0');
        const dStr = `${j}-${m}-${t}`;

        // 1. Check Google Tabelle
        if (onlineTausche[dStr]) return onlineTausche[dStr];

        // 2. Wochenende (Fr=5, Sa=6, So=0)
        const wochentag = datumObj.getDay();
        if (wochentag === 0 || wochentag === 5 || wochentag === 6) return "WG-Pause 🍺";

        // 3. Spezialfall HEUTE (03.03.2026)
        if (dStr === "2026-03-03") return "unser toller Besuch 🍕";

        // 4. Rotation ab 04.03.2026 (Felix startet)
        const anker = new Date(2026, 2, 4); // 4. März
        if (datumObj < anker) return "Besuch";

        let kochTage = 0;
        let temp = new Date(2026, 2, 4);
        while (temp <= datumObj) {
            const wt = temp.getDay();
            if (wt >= 1 && wt <= 4) kochTage++;
            temp.setDate(temp.getDate() + 1);
        }

        // Felix ist Index 4
        const index = (4 + (kochTage - 1)) % BEWOHNER.length;
        return BEWOHNER[index];
    }

    function baueKalender() {
        const liste = document.getElementById('calendar-list');
        liste.innerHTML = "";
        const heute = new Date();
        heute.setHours(0,0,0,0);

        // Header oben setzen
        document.getElementById('top-name').innerText = werKocht(heute);

        // Nächste 14 Tage
        for (let i = 0; i < 14; i++) {
            const tag = new Date();
            tag.setDate(heute.getDate() + i);
            tag.setHours(0,0,0,0);
            
            const koch = werKocht(tag);
            const zeile = document.createElement('div');
            zeile.className = 'day-row';
            if (i === 0) zeile.className += ' is-today';
            if (koch.includes("Pause")) zeile.className += ' weekend';

            const datumText = i === 0 ? "Heute" : tag.toLocaleDateString('de-DE', {weekday: 'short', day: '2-digit', month: '2-digit'});
            
            zeile.innerHTML = `<span>${datumText}</span><span class="chef">${koch}</span>`;
            liste.appendChild(zeile);
        }
    }

    ladeDatenUndStart();
</script>
</body>
</html>
